<!doctype html>
<html lang="en">
  <head>
    <!-- Page Title -->
    <title>PianoCalligraphy</title>
    
    <meta name="description" content="A collection of calligraphy art paired with piano music" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+KR:wght@300;400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Decorative background elements -->
    <div class="bg-texture"></div>
    <div class="petal petal-1">✿</div>
    <div class="petal petal-2">❀</div>
    <div class="petal petal-3">✾</div>
    <div class="petal petal-4">✿</div>
    <div class="petal petal-5">❀</div>

    <!-- Header -->
    <header class="main-header">
      <div class="header-decoration">
        ✿ ❀ ✾ ❀ ✿
      </div>
      <div class="header-content">
        <h1 class="title">PianoCalligraphy</h1>
      </div>
    </header>

    <!-- Controls -->
    <div class="controls-wrapper">
      <div class="controls">
        <!-- Search -->
        <!-- applySearchAndFilters() called every time the user types in the search input -->
        <div class="control-group">
          <label for="search-input">Search</label>
          <input
            type="text"
            id="search-input"
            placeholder="verse, song, or keyword..."
            oninput="applySearchAndFilters()"
          />
        </div>

        <!-- applySearchAndFilters() called every time the user changes a filter option -->
        <!-- Filter by type -->
        <div class="control-group">
          <label for="type-filter">Type</label>
          <select id="type-filter" onchange="applySearchAndFilters()">
            <option value="all">All Pieces</option>
            <option value="verse">Bible Verses</option>
            <option value="song">Song Lyrics</option>
            <option value="people">Pastors & Speakers</option>
            <option value="personal">Personal Messages</option>
          </select>
        </div>

        <!-- Sort -->
        <!-- handleSort() called every time the user changes the sort option -->
        <div class="control-group">
          <label for="sort-select">Sort By</label>
          <select id="sort-select" onchange="applySort()">
            <option value="date-desc">Most Recent</option>
            <option value="date-asc">Oldest First</option>
            <option value="bible-order">Bible Order</option>
            <option value="alpha">A → Z</option>
            <option value="alpha-desc">Z → A</option>
          </select>
        </div>

        <!-- Language toggle -->
        <div class="control-group">
          <label>Language</label>
          <div class="toggle-wrapper">
            <button id="lang-toggle" onclick="toggleLanguage()" class="lang-btn">
              <span id="lang-label">한국어</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Results count -->
      <p class="results-count" id="results-count"></p>
    </div>

    <!-- Card Container (this is where the cards are displayed) -->
    <div id="card-container"></div>

    <!-- Empty state (no results found) -->
    <div id="empty-state" style="display:none;">
      <div class="empty-state">
        <p class="empty-icon">🌸</p>
        <p>No pieces found. Try a different search or filter.</p>
      </div>
    </div>

    <!-- Hidden template card (invisible; JS clones this for each new card) --> 
    <div class="card" style="display: none">
      <div class="card-content">
        <img src="" alt="" />
        <span class="card-type"></span>
        <p class="card-title"></p>
        <p class="card-english"></p>
        <hr class="card-divider" />
        <div class="card-meta">
          <div class="card-meta-item" id="tool-item"></div>
          <div class="card-meta-item" id="piano-item"></div>
        </div>
      </div>
    </div>

    <!-- Favorites Section -->
    <div class="favorites-section" id="favorites-section">
      <div class="favorites-header">
        <h2>🌸 My Favorites <span id="fav-count" class="fav-count">0</span></h2>
        <!-- clear favorites button -->
        <button onclick="clearFavorites()" class="clear-btn">Clear All</button>
      </div>
      <div id="favorites-container" class="favorites-container">
        <p class="empty-fav-msg">Heart a piece to save it here ♡</p>
      </div>
    </div>

    <!-- Request Section -->
    <div class="request-section">
      <div class="request-inner">
        <h2 class="request-title">✦ Request a Piece ✦</h2>
        <p class="request-subtitle">Is there a verse or lyric you'd like written? Leave a request below.</p>
        <div class="request-form">
          <!-- name input -->
          <input type="text" id="request-name" placeholder="Your name" />
          <!-- verse/lyric input -->
          <input type="text" id="request-text" placeholder="The verse or lyric you'd like..." />
          <!-- reference input -->
          <input type="text" id="request-ref" placeholder="Reference (e.g. Psalm 23:1)" />
          <!-- submit button -->
          <button onclick="submitRequest()" class="submit-btn">Submit Request ✦</button>
        </div>
        <div id="requests-list"></div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <p>PianoCalligraphy</p>
    </footer>

    <script type="text/javascript" src="scripts.js"></script>
  </body>
</html>
